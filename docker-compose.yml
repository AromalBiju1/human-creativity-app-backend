services:
  api:
    build: ./Backend/human-creativity-backend1
    container_name: backapi
    ports:
      - "8000:8000"
    networks:
      - custom_net
    volumes:
      - ./Backend/human-creativity-backend1:/app
      - /home/Elysium/.secrets:/secrets:ro
    env_file:
      - ./Backend/human-creativity-backend1/.env.docker
    environment:
      - REDIS_URL=redis://redis_cache:6379       # <--- THIS goes here in the API service
    depends_on:
      - redis                              # <--- Make sure API waits for Redis

  web:
    build: ./Frontend1/human-creativity-app
    container_name: frontapi
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000  # <--- Fixed the formatting here
    networks:
      - custom_net
    depends_on:
      - api
    volumes:
      - ./Frontend1/human-creativity-app:/app
      - /app/node_modules

  redis:                                   # <--- Don't forget the actual Redis container!
    image: redis:alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    networks:
      - custom_net

networks:
  custom_net:
    driver: bridge